name: Update Subs

on:
  workflow_dispatch:
  schedule:
    - cron: "23 */6 * * *"

permissions:
  contents: write

concurrency:
  group: update-subs
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download latest subs-check-pro
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY' > asset_url.txt
          import json
          import urllib.request

          with urllib.request.urlopen("https://api.github.com/repos/sinspired/subs-check-pro/releases/latest") as resp:
              data = json.load(resp)

          for asset in data["assets"]:
              name = asset["name"]
              if "Linux_x86_64" in name and name.endswith(".tar.gz"):
                  print(asset["browser_download_url"])
                  break
          else:
              raise SystemExit("No Linux_x86_64 tar.gz asset found in latest release")
          PY

          curl -fsSL "$(cat asset_url.txt)" -o subs-check-pro.tar.gz
          tar -xzf subs-check-pro.tar.gz
          chmod +x subs-check-pro

      - name: Prepare config
        env:
          PRIVATE_SUB_URLS: ${{ secrets.PRIVATE_SUB_URLS }}
          PRIVATE_SUB_CONTENT: ${{ secrets.PRIVATE_SUB_CONTENT }}
          PRIVATE_REMOTE_LISTS: ${{ secrets.PRIVATE_REMOTE_LISTS }}
        shell: bash
        run: |
          set -euo pipefail
          WORK_DIR="${GITHUB_WORKSPACE}/.ci-runtime"
          OUTPUT_DIR="${WORK_DIR}/output"
          mkdir -p "${OUTPUT_DIR}/sub" "${OUTPUT_DIR}/stats"
          mkdir -p "${WORK_DIR}/http-root"
          mkdir -p "${GITHUB_WORKSPACE}/sources"

          if [[ -f "${GITHUB_WORKSPACE}/all.yaml" ]]; then
            cp "${GITHUB_WORKSPACE}/all.yaml" "${OUTPUT_DIR}/sub/all.yaml"
          fi
          if [[ -f "${GITHUB_WORKSPACE}/history.yaml" ]]; then
            cp "${GITHUB_WORKSPACE}/history.yaml" "${OUTPUT_DIR}/sub/history.yaml"
          fi

          export GITHUB_WORKSPACE WORK_DIR OUTPUT_DIR PRIVATE_SUB_URLS PRIVATE_SUB_CONTENT PRIVATE_REMOTE_LISTS
          python3 - <<'PY'
          import os
          from pathlib import Path

          root = Path(os.environ["GITHUB_WORKSPACE"])
          work_dir = Path(os.environ["WORK_DIR"])
          output_dir = os.environ["OUTPUT_DIR"]
          http_root = work_dir / "http-root"
          template_path = root / "config" / "mihomo-overwrite.yaml"

          def load_file_lines(path: Path):
              if not path.exists():
                  return []
              lines = []
              for raw in path.read_text().splitlines():
                  line = raw.strip()
                  if not line or line.startswith("#"):
                      continue
                  lines.append(line)
              return lines

          def load_env_lines(name: str):
              value = os.environ.get(name, "")
              return [line.strip() for line in value.splitlines() if line.strip()]

          def dedupe(items):
              seen = set()
              result = []
              for item in items:
                  if item in seen:
                      continue
                  seen.add(item)
                  result.append(item)
              return result

          def yaml_list(key: str, items):
              if not items:
                  return f"{key}: []"
              escaped = [item.replace("\\", "\\\\").replace('"', '\\"') for item in items]
              lines = [f'{key}:']
              lines.extend(f'  - "{item}"' for item in escaped)
              return "\n".join(lines)

          public_subs = load_file_lines(root / "sources" / "public-subs.txt")
          private_subs = load_env_lines("PRIVATE_SUB_URLS")
          private_sub_content = os.environ.get("PRIVATE_SUB_CONTENT", "").strip()
          public_remote_lists = load_file_lines(root / "sources" / "public-remote-lists.txt")
          private_remote_lists = load_env_lines("PRIVATE_REMOTE_LISTS")

          if not template_path.exists():
              raise SystemExit(f"Missing mihomo overwrite template: {template_path}")
          http_root.mkdir(parents=True, exist_ok=True)
          (http_root / "mihomo-overwrite.yaml").write_text(template_path.read_text())

          sub_urls = dedupe(public_subs + private_subs)
          remote_lists = dedupe(public_remote_lists + private_remote_lists)

          if private_sub_content:
              (http_root / "private-sub.txt").write_text(private_sub_content + "\n")
              sub_urls.append("http://127.0.0.1:18080/private-sub.txt#cf-workers-sub-legacy")
              sub_urls = dedupe(sub_urls)

          if not sub_urls and not remote_lists:
              raise SystemExit("No subscription sources configured")

          config_lines = [
              'print-progress: true',
              'progress-mode: "stage"',
              '',
              'cron-expression: ""',
              'check-interval: 720',
              '',
              'alive-concurrent: 60',
              'speed-concurrent: 6',
              'media-concurrent: 8',
              'ipv6: false',
              'timeout: 7000',
              'concurrent: 20',
              'success-limit: 120',
              'keep-success-proxies: true',
              '',
              'min-speed: 384',
              'download-timeout: 5',
              'download-mb: 2',
              'total-speed-limit: 8',
              'speed-test-url: "random"',
              'threshold: 0.75',
              '',
              'update: false',
              'update-on-startup: false',
              'cron-check-update: ""',
              'prerelease: false',
              'update-timeout: 2',
              '',
              'listen-port: ":18199"',
              'enable-web-ui: false',
              'api-key: ""',
              'share-password: ""',
              '',
              'sub-store-port: ""',
              'sub-store-path: ""',
              'mihomo-overwrite-url: "http://127.0.0.1:18080/mihomo-overwrite.yaml"',
              '',
              'rename-node: true',
              'node-prefix: ""',
              'node-type:',
              '  - vless',
              '  - trojan',
              '  - ss',
              '  - vmess',
              'drop-bad-cf-nodes: false',
              'isp-check: false',
              'media-check: true',
              'platforms:',
              '  - iprisk',
              '  - openai',
              '  - gemini',
              '  - copilot',
              '  - youtube',
              '  - tiktok',
              '  - x',
              'enhanced-tag: true',
              'maxmind-db-path: ""',
              '',
              'callback-script: ""',
              '',
              f'output-dir: "{output_dir}"',
              'save-method: "local"',
              '',
              'system-proxy: ""',
              'github-proxy: ""',
              'ghproxy-group: []',
              '',
              'sub-urls-retry: 2',
              'sub-urls-timeout: 25',
              'success-rate: 0',
          ]

          config_lines.extend(yaml_list("sub-urls-remote", remote_lists).splitlines())
          config_lines.extend(yaml_list("sub-urls", sub_urls).splitlines())
          config_lines.extend([
              '',
              'sub-process:',
              '  resolve-domain: false',
              '  node-split: false',
              '  sub-info: false',
              '  regex-filter-keep: true',
              '  regex-filter: []',
              '  regex-sort:',
              '    - ".*\\\\bHK\\\\b.*"',
              '    - ".*\\\\bTW\\\\b.*"',
              '    - ".*\\\\bJP\\\\b.*"',
              '    - ".*\\\\bSG\\\\b.*"',
              '    - ".*\\\\bUS\\\\b.*"',
          ])

          (work_dir / "config.yaml").write_text("\n".join(config_lines) + "\n")
          print(f"Configured {len(sub_urls)} direct sources and {len(remote_lists)} remote lists")
          PY

      - name: Run checker
        shell: bash
        run: |
          set -euo pipefail
          WORK_DIR="${GITHUB_WORKSPACE}/.ci-runtime"
          LOG_FILE="${WORK_DIR}/run.log"
          HTTP_ROOT_PID=""

          if [[ -d "${WORK_DIR}/http-root" ]]; then
            python3 -m http.server 18080 --bind 127.0.0.1 --directory "${WORK_DIR}/http-root" > "${WORK_DIR}/http-root.log" 2>&1 &
            HTTP_ROOT_PID=$!
          fi

          ./subs-check-pro -f "${WORK_DIR}/config.yaml" > "${LOG_FILE}" 2>&1 &
          PID=$!

          cleanup() {
            kill "${PID}" 2>/dev/null || true
            if [[ -n "${HTTP_ROOT_PID}" ]]; then
              kill "${HTTP_ROOT_PID}" 2>/dev/null || true
            fi
          }
          trap cleanup EXIT

          for _ in $(seq 1 180); do
            if [[ -f "${WORK_DIR}/output/sub/mihomo.yaml" && -f "${WORK_DIR}/output/stats/subs-analysis.yaml" ]]; then
              sleep 3
              break
            fi
            sleep 2
          done

          if [[ ! -f "${WORK_DIR}/output/sub/mihomo.yaml" || ! -f "${WORK_DIR}/output/stats/subs-analysis.yaml" ]]; then
            cat "${LOG_FILE}"
            exit 1
          fi

          cat "${LOG_FILE}" | tail -n 80

      - name: Sync generated files
        shell: bash
        run: |
          set -euo pipefail
          WORK_DIR="${GITHUB_WORKSPACE}/.ci-runtime"
          mkdir -p stats
          cp "${WORK_DIR}/output/sub/all.yaml" ./all.yaml
          cp "${WORK_DIR}/output/sub/mihomo.yaml" ./mihomo.yaml
          cp "${WORK_DIR}/output/sub/history.yaml" ./history.yaml
          cp "${WORK_DIR}/output/stats/sub-urls.yaml" ./stats/sub-urls.yaml
          cp "${WORK_DIR}/output/stats/subs-analysis.yaml" ./stats/subs-analysis.yaml
          cp "${WORK_DIR}/output/stats/subs-filter.yaml" ./stats/subs-filter.yaml

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add all.yaml mihomo.yaml history.yaml stats/sub-urls.yaml stats/subs-analysis.yaml stats/subs-filter.yaml sources/public-subs.txt sources/public-remote-lists.txt sources/README.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "auto update $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git push

name: Update Subs

on:
  workflow_dispatch:
  schedule:
    - cron: "23 */6 * * *"

permissions:
  contents: write

concurrency:
  group: update-subs
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download latest subs-check-pro
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY' > asset_url.txt
          import json
          import urllib.request

          with urllib.request.urlopen("https://api.github.com/repos/sinspired/subs-check-pro/releases/latest") as resp:
              data = json.load(resp)

          for asset in data["assets"]:
              name = asset["name"]
              if "Linux_x86_64" in name and name.endswith(".tar.gz"):
                  print(asset["browser_download_url"])
                  break
          else:
              raise SystemExit("No Linux_x86_64 tar.gz asset found in latest release")
          PY

          curl -fsSL "$(cat asset_url.txt)" -o subs-check-pro.tar.gz
          tar -xzf subs-check-pro.tar.gz
          chmod +x subs-check-pro

      - name: Prepare config
        shell: bash
        run: |
          set -euo pipefail
          WORK_DIR="${GITHUB_WORKSPACE}/.ci-runtime"
          OUTPUT_DIR="${WORK_DIR}/output"
          mkdir -p "${OUTPUT_DIR}/sub" "${OUTPUT_DIR}/stats"

          if [[ -f "${GITHUB_WORKSPACE}/all.yaml" ]]; then
            cp "${GITHUB_WORKSPACE}/all.yaml" "${OUTPUT_DIR}/sub/all.yaml"
          fi
          if [[ -f "${GITHUB_WORKSPACE}/history.yaml" ]]; then
            cp "${GITHUB_WORKSPACE}/history.yaml" "${OUTPUT_DIR}/sub/history.yaml"
          fi

          cat > "${WORK_DIR}/config.yaml" <<EOF
          print-progress: true
          progress-mode: "stage"

          cron-expression: ""
          check-interval: 720

          alive-concurrent: 60
          speed-concurrent: 0
          media-concurrent: 0
          ipv6: false
          timeout: 7000
          concurrent: 24
          success-limit: 300
          keep-success-proxies: true

          min-speed: 128
          download-timeout: 10
          download-mb: 10
          total-speed-limit: 0
          speed-test-url: ""
          threshold: 0.75

          update: false
          update-on-startup: false
          cron-check-update: ""
          prerelease: false
          update-timeout: 2

          listen-port: ":18199"
          enable-web-ui: false
          api-key: ""
          share-password: ""

          sub-store-port: ""
          sub-store-path: ""
          mihomo-overwrite-url: "https://raw.githubusercontent.com/sinspired/proxy-rules/main/Sinspired_Rules_CDN.yaml"

          rename-node: true
          node-prefix: ""
          drop-bad-cf-nodes: false
          isp-check: false
          media-check: false
          platforms:
            - iprisk
          enhanced-tag: true
          maxmind-db-path: ""

          callback-script: ""

          output-dir: "${OUTPUT_DIR}"
          save-method: "local"

          system-proxy: ""
          github-proxy: ""
          ghproxy-group: []

          sub-urls-retry: 2
          sub-urls-timeout: 25
          success-rate: 0
          sub-urls-remote:
            - "https://raw.githubusercontent.com/sinspired/airport/main/subs/merged/col.txt"
            - "https://raw.githubusercontent.com/sinspired/airport/main/subs/merged/cm.txt"
            - "https://raw.githubusercontent.com/sinspired/airport/main/subs/merged/scan.txt"
          sub-urls:
            - "https://a.ak.cloudns.be/be?b64#cf-workers-sub"
            - "https://workervless2sub-2a3.pages.dev/auto?b64#workervless2sub"

          sub-process:
            resolve-domain: false
            node-split: false
            sub-info: false
            regex-filter-keep: true
            regex-filter: []
            regex-sort:
              - ".*\\bHK\\b.*"
              - ".*\\bJP\\b.*"
              - ".*\\bSG\\b.*"
              - ".*\\bUS\\b.*"
          EOF

      - name: Run checker
        shell: bash
        run: |
          set -euo pipefail
          WORK_DIR="${GITHUB_WORKSPACE}/.ci-runtime"
          LOG_FILE="${WORK_DIR}/run.log"
          ./subs-check-pro -f "${WORK_DIR}/config.yaml" > "${LOG_FILE}" 2>&1 &
          PID=$!

          cleanup() {
            kill "${PID}" 2>/dev/null || true
          }
          trap cleanup EXIT

          for _ in $(seq 1 180); do
            if [[ -f "${WORK_DIR}/output/sub/mihomo.yaml" && -f "${WORK_DIR}/output/stats/subs-analysis.yaml" ]]; then
              sleep 3
              break
            fi
            sleep 2
          done

          if [[ ! -f "${WORK_DIR}/output/sub/mihomo.yaml" || ! -f "${WORK_DIR}/output/stats/subs-analysis.yaml" ]]; then
            cat "${LOG_FILE}"
            exit 1
          fi

          cat "${LOG_FILE}" | tail -n 80

      - name: Sync generated files
        shell: bash
        run: |
          set -euo pipefail
          WORK_DIR="${GITHUB_WORKSPACE}/.ci-runtime"
          mkdir -p stats
          cp "${WORK_DIR}/output/sub/all.yaml" ./all.yaml
          cp "${WORK_DIR}/output/sub/mihomo.yaml" ./mihomo.yaml
          cp "${WORK_DIR}/output/sub/history.yaml" ./history.yaml
          cp "${WORK_DIR}/output/stats/sub-urls.yaml" ./stats/sub-urls.yaml
          cp "${WORK_DIR}/output/stats/subs-analysis.yaml" ./stats/subs-analysis.yaml
          cp "${WORK_DIR}/output/stats/subs-filter.yaml" ./stats/subs-filter.yaml

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add all.yaml mihomo.yaml history.yaml stats/sub-urls.yaml stats/subs-analysis.yaml stats/subs-filter.yaml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "auto update $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git push

name: Mirror CF Workers SUB

on:
  workflow_dispatch:
  schedule:
    - cron: "13 * * * *"

permissions:
  contents: write

concurrency:
  group: mirror-cf-workers-sub
  cancel-in-progress: true

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch latest static mirror artifacts
        shell: bash
        run: |
          set -euo pipefail

          curl -fsSL 'https://raw.githubusercontent.com/XavierXIEXIN/CF-Workers-SUB/main/LINK.txt' -o cf-workers-sub.link.txt
          python3 scripts/generate_cf_workers_sub_mirror.py \
            cf-workers-sub.link.txt \
            cf-workers-sub.b64.txt \
            cf-workers-sub.clash.yaml \
            cf-workers-sub.meta.json

      - name: Commit mirror update
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/generate_cf_workers_sub_mirror.py cf-workers-sub.link.txt cf-workers-sub.b64.txt cf-workers-sub.clash.yaml cf-workers-sub.meta.json
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "mirror cf-workers-sub $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
